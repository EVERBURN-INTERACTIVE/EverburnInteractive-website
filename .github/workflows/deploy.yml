name: Deploy GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Security Audit
        run: npm run audit

      - name: Configure public environment
        env:
          DBVARS: ${{ vars.DBVARS || secrets.DBVARS }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          touch .env.local
          if [ -n "$DBVARS" ]; then
            printf '%s\n' "$DBVARS" >> .env.local
          fi
          if [ -n "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            printf 'NEXT_PUBLIC_SUPABASE_URL=%s\n' "$NEXT_PUBLIC_SUPABASE_URL" >> .env.local
          fi
          if [ -n "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" ]; then
            printf 'NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=%s\n' "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" >> .env.local
          fi

      - name: Verify Supabase public env for build
        run: |
          if ! grep -q '^NEXT_PUBLIC_SUPABASE_URL=' .env.local; then
            echo 'Missing NEXT_PUBLIC_SUPABASE_URL in build env.'
            echo 'DBVARS must use exact names (case-sensitive):'
            echo '  NEXT_PUBLIC_SUPABASE_URL=https://YOUR_PROJECT.supabase.co'
            echo '  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=your_publishable_key'
            echo 'Place DBVARS under Actions > Variables, or Actions > Secrets (both are supported).'
            exit 1
          fi
          if ! grep -q '^NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=' .env.local; then
            echo 'Missing NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY in build env.'
            exit 1
          fi
          echo 'Supabase public env vars present for static build.'

      - name: Build
        run: npm run build

      - name: Preserve CNAME
        run: cp CNAME out/CNAME

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
